  <rect x="624" y="184" width="35" height="10" rx="2" fill="rgba(245,158,11,0.5)"/>
  <rect x="663" y="184" width="35" height="10" rx="2" fill="rgba(245,158,11,0.65)"/>
  <rect x="702" y="184" width="35" height="10" rx="2" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1" stroke-dasharray="2,2"/>

