  <!-- Arrow to right -->
  <line x1="490" y1="210" x2="530" y2="210" stroke="rgba(245,158,11,0.45)" stroke-width="1.5"/>
  <polygon points="526,206 534,210 526,214" fill="rgba(245,158,11,0.55)"/>

