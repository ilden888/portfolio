  <rect x="348" y="214" width="124" height="28" rx="4" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.22)" stroke-width="1"/>
  <text x="410" y="232" text-anchor="middle" font-family="monospace" font-size="8.5" fill="rgba(251,191,36,0.72)">Bracket Engine</text>

  <rect x="348" y="250" width="124" height="28" rx="4" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.28)" stroke-width="1"/>
