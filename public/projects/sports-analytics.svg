  <text x="120" y="107" text-anchor="middle" font-family="monospace" font-size="22" fill="rgba(34,211,238,0.85)" font-weight="bold">87.4</text>
  <text x="120" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(6,182,212,0.55)">avg performance score</text>
  <text x="120" y="132" text-anchor="middle" font-family="monospace" font-size="7.5" fill="rgba(6,182,212,0.4)">↑ 4.2 vs last season</text>

