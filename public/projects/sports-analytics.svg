<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04111a"/>
      <stop offset="100%" stop-color="#080a0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <rect width="800" height="400" fill="url(#glow)"/>

  <!-- Label -->
  <text x="40" y="66" font-family="monospace" font-size="9" fill="rgba(6,182,212,0.45)" letter-spacing="1.5">SPORTS ANALYTICS</text>
  <rect x="40" y="72" width="280" height="1" fill="rgba(6,182,212,0.12)"/>

  <!-- Left: stat cards column -->
