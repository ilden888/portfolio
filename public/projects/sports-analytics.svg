  <text x="120" y="183" text-anchor="middle" font-family="monospace" font-size="22" fill="rgba(34,211,238,0.75)" font-weight="bold">2,340</text>
  <text x="120" y="196" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(6,182,212,0.5)">matches analysed</text>
  <text x="120" y="208" text-anchor="middle" font-family="monospace" font-size="7.5" fill="rgba(6,182,212,0.38)">DuckDB · Parquet</text>

