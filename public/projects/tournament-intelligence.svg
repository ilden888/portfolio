  <text x="554" y="347" font-family="monospace" font-size="7.5" fill="rgba(251,191,36,0.65)">AI: Team A win probability 78% ↑</text>

  <!-- Bottom label -->
  <text x="40" y="378" font-family="monospace" font-size="9" fill="rgba(245,158,11,0.35)" letter-spacing="2">TOURNAMENT INTELLIGENCE · KAFKA · POSTGRESQL · OPENAI</text>
