  <text x="662" y="125" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.4)">:</text>
  <text x="678" y="125" text-anchor="middle" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.55)">1</text>
  <text x="720" y="125" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.55)">Team B</text>
  <text x="645" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(245,158,11,0.55)">● LIVE  Round 4/5</text>

