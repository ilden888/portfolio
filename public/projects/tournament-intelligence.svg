<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141008"/>
      <stop offset="100%" stop-color="#0a0a0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="45%" r="52%">
      <stop offset="0%" stop-color="rgba(245,158,11,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <rect width="800" height="400" fill="url(#glow)"/>

  <!-- Left: Kafka event stream -->
  <text x="40" y="74" font-family="monospace" font-size="9" fill="rgba(245,158,11,0.45)" letter-spacing="1.5">REALTIME STREAM</text>

  <!-- Event stream pulses -->
  <rect x="40" y="86" width="240" height="22" rx="4" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <circle cx="58" cy="97" r="4" fill="rgba(245,158,11,0.7)"/>
  <text x="70" y="101" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.5)">match_start · team_A vs team_B · 14:02:33</text>

  <rect x="40" y="114" width="240" height="22" rx="4" fill="rgba(245,158,11,0.05)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <circle cx="58" cy="125" r="4" fill="rgba(245,158,11,0.5)"/>
  <text x="70" y="129" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.45)">score_update · 2:1 · round 3 · 14:04:11</text>

  <rect x="40" y="142" width="240" height="22" rx="4" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>
  <circle cx="58" cy="153" r="4" fill="rgba(245,158,11,0.35)"/>
  <text x="70" y="157" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.38)">player_stat · kills:4 assists:2 · 14:05:47</text>

  <rect x="40" y="170" width="240" height="22" rx="4" fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.1)" stroke-width="1"/>
  <circle cx="58" cy="181" r="3.5" fill="rgba(245,158,11,0.22)"/>
  <text x="70" y="185" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.3)">match_end · winner: team_A · 14:18:02</text>

  <!-- Kafka label -->
  <rect x="40" y="206" width="100" height="24" rx="4" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.22)" stroke-width="1"/>
  <text x="90" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(251,191,36,0.75)">Kafka</text>

  <rect x="148" y="206" width="80" height="24" rx="4" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.22)" stroke-width="1"/>
