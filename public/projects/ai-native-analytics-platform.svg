<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- Stack layers (left column) -->
  <!-- S3 -->
  <rect x="52" y="338" width="160" height="38" rx="5" fill="rgba(124,58,237,0.07)" stroke="rgba(124,58,237,0.22)" stroke-width="1"/>
  <text x="132" y="361" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.65)">S3 · Object Store</text>
  <!-- connector -->
  <line x1="132" y1="338" x2="132" y2="322" stroke="rgba(124,58,237,0.35)" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Iceberg -->
  <rect x="52" y="284" width="160" height="38" rx="5" fill="rgba(124,58,237,0.09)" stroke="rgba(124,58,237,0.28)" stroke-width="1"/>
  <text x="132" y="307" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.75)">Apache Iceberg</text>
  <line x1="132" y1="284" x2="132" y2="268" stroke="rgba(124,58,237,0.35)" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- dbt -->
  <rect x="52" y="230" width="160" height="38" rx="5" fill="rgba(124,58,237,0.11)" stroke="rgba(124,58,237,0.32)" stroke-width="1"/>
  <text x="132" y="253" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.8)">dbt Semantic Layer</text>
  <line x1="132" y1="230" x2="132" y2="214" stroke="rgba(124,58,237,0.35)" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Claude -->
  <rect x="52" y="176" width="160" height="38" rx="5" fill="rgba(124,58,237,0.16)" stroke="rgba(139,92,246,0.5)" stroke-width="1.5"/>
  <text x="132" y="195" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(196,181,253,0.9)">Claude AI Agent</text>
  <text x="132" y="208" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(139,92,246,0.6)">reasoning · explainable</text>

  <!-- horizontal connector to query panel -->
  <line x1="212" y1="195" x2="262" y2="195" stroke="rgba(124,58,237,0.4)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Query / response panel -->
  <rect x="262" y="110" width="490" height="296" rx="8" fill="rgba(255,255,255,0.018)" stroke="rgba(124,58,237,0.14)" stroke-width="1"/>

  <!-- Prompt bar -->
  <rect x="278" y="126" width="458" height="46" rx="5" fill="rgba(124,58,237,0.07)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <text x="294" y="145" font-family="monospace" font-size="10" fill="rgba(139,92,246,0.6)">›_</text>
  <text x="314" y="145" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)">What drove revenue growth last quarter?</text>
  <text x="294" y="160" font-family="monospace" font-size="8.5" fill="rgba(124,58,237,0.45)">trusted metrics · explainable · auditable</text>

  <!-- AI response text lines -->
  <rect x="278" y="186" width="240" height="7" rx="3" fill="rgba(255,255,255,0.09)"/>
  <rect x="278" y="200" width="200" height="7" rx="3" fill="rgba(255,255,255,0.065)"/>
  <rect x="278" y="214" width="220" height="7" rx="3" fill="rgba(255,255,255,0.075)"/>
  <rect x="278" y="228" width="160" height="7" rx="3" fill="rgba(255,255,255,0.055)"/>

  <!-- Bar chart -->
  <rect x="278" y="252" width="10" height="60" rx="2" fill="rgba(124,58,237,0.25)" transform="translate(0,0) scale(1,-1) translate(0,-312)"/>

  <!-- bars (bottom aligned at y=310) -->
  <rect x="278" y="282" width="18" height="28" rx="2" fill="rgba(124,58,237,0.28)"/>
  <rect x="302" y="272" width="18" height="38" rx="2" fill="rgba(124,58,237,0.36)"/>
  <rect x="326" y="260" width="18" height="50" rx="2" fill="rgba(124,58,237,0.44)"/>
  <rect x="350" y="250" width="18" height="60" rx="2" fill="rgba(124,58,237,0.52)"/>
  <rect x="374" y="255" width="18" height="55" rx="2" fill="rgba(124,58,237,0.48)"/>
  <rect x="398" y="242" width="18" height="68" rx="2" fill="rgba(139,92,246,0.6)"/>
  <rect x="422" y="232" width="18" height="78" rx="2" fill="rgba(139,92,246,0.72)"/>
  <!-- chart baseline -->
  <line x1="278" y1="310" x2="450" y2="310" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>

  <!-- Metric badges -->
  <rect x="462" y="186" width="86" height="28" rx="4" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.28)" stroke-width="1"/>
  <text x="505" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(196,181,253,0.85)">↑ 23% MoM</text>
  <text x="505" y="211" text-anchor="middle" font-family="monospace" font-size="7.5" fill="rgba(139,92,246,0.55)">revenue</text>

  <rect x="558" y="186" width="80" height="28" rx="4" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.28)" stroke-width="1"/>
  <text x="598" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(196,181,253,0.85)">98.2% trust</text>
  <text x="598" y="211" text-anchor="middle" font-family="monospace" font-size="7.5" fill="rgba(139,92,246,0.55)">score</text>

  <rect x="648" y="186" width="80" height="28" rx="4" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.28)" stroke-width="1"/>
  <text x="688" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(196,181,253,0.85)">3 sources</text>
  <text x="688" y="211" text-anchor="middle" font-family="monospace" font-size="7.5" fill="rgba(139,92,246,0.55)">merged</text>

  <!-- Line chart in right area -->
  <polyline points="462,290 490,278 518,282 546,265 574,260 602,248 630,242 658,235 686,224 714,216 728,210" fill="none" stroke="rgba(139,92,246,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="462,290 490,278 518,282 546,265 574,260 602,248 630,242 658,235 686,224 714,216 728,210" fill="none" stroke="rgba(139,92,246,0.12)" stroke-width="8"/>
  <line x1="462" y1="310" x2="735" y2="310" stroke="rgba(124,58,237,0.18)" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="52" y="415" font-family="monospace" font-size="9" fill="rgba(124,58,237,0.4)" letter-spacing="2">AI-NATIVE ANALYTICS PLATFORM</text>

  <!-- Top label -->
  <text x="52" y="72" font-family="monospace" font-size="11" fill="rgba(196,181,253,0.55)" letter-spacing="1.5">AI WORKFLOW</text>
  <rect x="52" y="80" width="380" height="1" fill="rgba(124,58,237,0.15)"/>
  <text x="52" y="97" font-family="monospace" font-size="9" fill="rgba(124,58,237,0.4)">Iceberg · dbt · Semantic Layer · Claude · S3</text>
</svg>
