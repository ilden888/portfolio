  <text x="650" y="222" font-family="monospace" font-size="8" fill="rgba(245,158,11,0.45)">K</text>
  <text x="672" y="222" font-family="monospace" font-size="8" fill="rgba(245,158,11,0.45)">A</text>
  <text x="694" y="222" font-family="monospace" font-size="8" fill="rgba(245,158,11,0.45)">Rating</text>
  <line x1="546" y1="226" x2="744" y2="226" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>
  <text x="554" y="239" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.55)">xXxSniper</text>
  <text x="650" y="239" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.55)">12</text>
  <text x="672" y="239" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.45)">4</text>
  <text x="694" y="239" font-family="monospace" font-size="8" fill="rgba(251,191,36,0.75)">1.84</text>
  <text x="554" y="252" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.45)">ProGamer99</text>
  <text x="650" y="252" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.45)">8</text>
  <text x="672" y="252" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">6</text>
  <text x="694" y="252" font-family="monospace" font-size="8" fill="rgba(251,191,36,0.6)">1.31</text>
  <text x="554" y="265" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.38)">SpeedRun_K</text>
  <text x="650" y="265" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.38)">6</text>
  <text x="672" y="265" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.35)">8</text>
