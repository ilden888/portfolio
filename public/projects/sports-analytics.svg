  <text x="120" y="272" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(6,182,212,0.48)">prediction accuracy</text>
  <text x="120" y="284" text-anchor="middle" font-family="monospace" font-size="7.5" fill="rgba(6,182,212,0.36)">Claude reasoning</text>

