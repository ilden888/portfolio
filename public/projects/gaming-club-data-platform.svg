<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1e"/>
      <stop offset="100%" stop-color="#080814"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.16)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <rect width="800" height="400" fill="url(#glow)"/>

  <!-- Pipeline flow: Source → Ingest → Warehouse → Analytics -->

  <!-- Source nodes (left) -->
  <rect x="40" y="120" width="110" height="34" rx="5" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
  <text x="95" y="138" text-anchor="middle" font-family="monospace" font-size="9.5" fill="rgba(165,180,252,0.75)">POS Events</text>
  <text x="95" y="149" text-anchor="middle" font-family="monospace" font-size="7.5" fill="rgba(99,102,241,0.45)">realtime stream</text>

  <rect x="40" y="174" width="110" height="34" rx="5" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
  <text x="95" y="192" text-anchor="middle" font-family="monospace" font-size="9.5" fill="rgba(165,180,252,0.75)">Booking API</text>
  <text x="95" y="203" text-anchor="middle" font-family="monospace" font-size="7.5" fill="rgba(99,102,241,0.45)">REST · webhooks</text>

  <rect x="40" y="228" width="110" height="34" rx="5" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
  <text x="95" y="246" text-anchor="middle" font-family="monospace" font-size="9.5" fill="rgba(165,180,252,0.75)">Club Activity</text>
  <text x="95" y="257" text-anchor="middle" font-family="monospace" font-size="7.5" fill="rgba(99,102,241,0.45)">sessions · spend</text>

  <!-- Arrows source → ingest -->
  <line x1="150" y1="137" x2="192" y2="160" stroke="rgba(99,102,241,0.35)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="191" x2="192" y2="175" stroke="rgba(99,102,241,0.35)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="245" x2="192" y2="190" stroke="rgba(99,102,241,0.3)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Ingest / Airflow -->
  <rect x="192" y="138" width="120" height="54" rx="6" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="252" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(165,180,252,0.85)">Airflow</text>
  <text x="252" y="171" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.55)">Python pipelines</text>
  <text x="252" y="183" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.45)">ingestion · scheduling</text>

  <!-- Arrow ingest → warehouse -->
  <line x1="312" y1="165" x2="354" y2="165" stroke="rgba(99,102,241,0.45)" stroke-width="1.5"/>
  <polygon points="350,161 358,165 350,169" fill="rgba(99,102,241,0.55)"/>

  <!-- PostgreSQL warehouse -->
  <rect x="354" y="106" width="120" height="54" rx="6" fill="rgba(99,102,241,0.11)" stroke="rgba(99,102,241,0.38)" stroke-width="1.2"/>
  <text x="414" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(165,180,252,0.88)">PostgreSQL</text>
  <text x="414" y="141" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.55)">centralised DWH</text>
  <text x="414" y="153" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.45)">raw · staging · mart</text>

  <!-- dbt transformation -->
  <rect x="354" y="176" width="120" height="54" rx="6" fill="rgba(99,102,241,0.11)" stroke="rgba(99,102,241,0.38)" stroke-width="1.2"/>
  <text x="414" y="198" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(165,180,252,0.88)">dbt</text>
  <text x="414" y="211" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.55)">transformations</text>
  <text x="414" y="223" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.45)">semantic models</text>

  <!-- ClickHouse OLAP -->
  <rect x="354" y="246" width="120" height="54" rx="6" fill="rgba(99,102,241,0.11)" stroke="rgba(99,102,241,0.38)" stroke-width="1.2"/>
  <text x="414" y="268" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(165,180,252,0.88)">ClickHouse</text>
  <text x="414" y="281" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.55)">OLAP · analytics</text>
  <text x="414" y="293" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.45)">aggregations</text>

  <!-- Internal connections among warehouse nodes -->
  <line x1="414" y1="160" x2="414" y2="176" stroke="rgba(99,102,241,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="414" y1="230" x2="414" y2="246" stroke="rgba(99,102,241,0.3)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrows warehouse → analytics -->
  <line x1="474" y1="133" x2="522" y2="155" stroke="rgba(99,102,241,0.4)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="474" y1="200" x2="522" y2="200" stroke="rgba(99,102,241,0.4)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="474" y1="268" x2="522" y2="245" stroke="rgba(99,102,241,0.35)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Analytics/Metabase output -->
  <rect x="522" y="130" width="120" height="54" rx="6" fill="rgba(99,102,241,0.14)" stroke="rgba(99,102,241,0.45)" stroke-width="1.5"/>
  <text x="582" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(165,180,252,0.92)">Metabase</text>
  <text x="582" y="165" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.6)">dashboards</text>
  <text x="582" y="177" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(99,102,241,0.45)">decision-ready</text>

  <!-- Mini dashboard in Metabase box -->
  <!-- small bars -->
  <rect x="530" y="148" width="5" height="12" rx="1" fill="rgba(99,102,241,0.35)"/>
  <rect x="538" y="144" width="5" height="16" rx="1" fill="rgba(99,102,241,0.45)"/>
  <rect x="546" y="140" width="5" height="20" rx="1" fill="rgba(99,102,241,0.55)"/>

  <!-- Metric chips bottom -->
  <rect x="522" y="316" width="70" height="24" rx="4" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="557" y="332" text-anchor="middle" font-family="monospace" font-size="8.5" fill="rgba(165,180,252,0.75)">+40% speed</text>

  <rect x="602" y="316" width="76" height="24" rx="4" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="640" y="332" text-anchor="middle" font-family="monospace" font-size="8.5" fill="rgba(165,180,252,0.75)">3 data sources</text>

  <rect x="688" y="316" width="72" height="24" rx="4" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="724" y="332" text-anchor="middle" font-family="monospace" font-size="8.5" fill="rgba(165,180,252,0.75)">real-time</text>

  <!-- Label -->
  <text x="40" y="66" font-family="monospace" font-size="11" fill="rgba(165,180,252,0.5)" letter-spacing="1.5">DATA PLATFORM</text>
  <rect x="40" y="72" width="320" height="1" fill="rgba(99,102,241,0.15)"/>
  <text x="40" y="88" font-family="monospace" font-size="9" fill="rgba(99,102,241,0.4)">PostgreSQL · ClickHouse · Airflow · dbt · Metabase</text>
</svg>
